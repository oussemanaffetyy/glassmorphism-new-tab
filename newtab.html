<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>New Tab — Aura</title>
    <link rel="stylesheet" href="tailwind.css" />
    <link rel="stylesheet" href="newtab.css" />
  </head>
  <body class="font-sans text-white">
    <main
      id="app"
      class="relative h-screen w-screen overflow-hidden bg-cover bg-center"
      style="background-image: url('assets/bg-scenic.jpg')"
    >
      <div class="pointer-events-none absolute inset-0 bg-gradient-to-b from-black/10 via-transparent to-black/30"></div>
      <div
        class="pointer-events-none absolute inset-0"
        style="background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.35) 100%);"
      ></div>

      <!-- Date -->
      <section class="absolute left-6 top-6 z-10">
        <div class="glass rounded-3xl px-5 py-3 shadow-2xl">
          <div class="text-xs uppercase tracking-[0.2em] text-white/70">Today</div>
          <div id="date" class="text-sm font-medium">—</div>
        </div>
      </section>

      <!-- Weather -->
      <section class="absolute right-6 top-6 z-10">
        <div id="weather" class="glass flex items-center gap-4 rounded-3xl px-5 py-4 shadow-2xl">
          <div class="rounded-2xl bg-white/10 p-2.5">
            <span id="wx-icon" class="text-2xl">☀️</span>
          </div>
          <div class="leading-tight">
            <div class="flex items-baseline gap-1">
              <span id="wx-temp" class="text-3xl font-light tracking-tight">—°</span>
              <span class="text-xs text-white/70">C</span>
            </div>
            <div id="wx-loc" class="text-xs text-white/80">Locating…</div>
          </div>
          <div class="ml-2 flex flex-col items-end text-[10px] text-white/70">
            <div>H <span id="wx-hi">—</span>°</div>
            <div>L <span id="wx-lo">—</span>°</div>
          </div>
        </div>
      </section>

      <!-- Center -->
      <section class="relative z-10 flex h-full w-full flex-col items-center justify-center px-6">
        <h1
          id="clock"
          class="select-none font-extralight leading-none tracking-tighter drop-shadow-[0_4px_30px_rgba(0,0,0,0.4)]"
          style="font-size: clamp(5rem, 16vw, 12rem);"
        >
          00:00
        </h1>
        <p id="greet" class="mt-2 text-xl font-light text-white/90 drop-shadow-md sm:text-2xl">
          Hello
        </p>

        <form id="search-form" class="mt-8 w-full max-w-xl">
          <div class="glass flex items-center gap-3 rounded-full px-5 py-3.5 shadow-2xl transition focus-within:shadow-[0_0_40px_rgba(255,255,255,0.25)]">
            <span class="text-white/70">🔍</span>
            <input
              id="search-input"
              type="text"
              autocomplete="off"
              placeholder="Ask anything, find anything…"
              class="w-full bg-transparent text-base text-white placeholder:text-white/60 focus:outline-none"
            />
            <kbd class="hidden rounded-md border border-white/20 bg-white/10 px-1.5 py-0.5 text-[10px] text-white/70 sm:block">⏎</kbd>
          </div>
        </form>

        <div class="mt-10 flex flex-wrap items-center justify-center gap-4">
          <a href="https://youtube.com" title="YouTube" aria-label="YouTube" class="quick">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m10 15 5.19-3L10 9v6Z"></path>
              <path d="M21.56 7.15a2.75 2.75 0 0 0-1.94-1.94C17.91 4.75 12 4.75 12 4.75s-5.91 0-7.62.46a2.75 2.75 0 0 0-1.94 1.94A28.5 28.5 0 0 0 2 12a28.5 28.5 0 0 0 .44 4.85 2.75 2.75 0 0 0 1.94 1.94c1.71.46 7.62.46 7.62.46s5.91 0 7.62-.46a2.75 2.75 0 0 0 1.94-1.94A28.5 28.5 0 0 0 22 12a28.5 28.5 0 0 0-.44-4.85Z"></path>
            </svg>
          </a>
          <a href="https://netflix.com" title="Netflix" aria-label="Netflix" class="quick">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M7 4.5h3.1l3.8 9.25V4.5H17v15h-3.1l-3.8-9.25v9.25H7v-15Z"></path>
            </svg>
          </a>
          <a href="https://github.com" title="GitHub" aria-label="GitHub" class="quick">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5a10.4 10.4 0 0 0-6 0C8 2 7 2 7 2c-.3 1.15-.3 2.35 0 3.5A5.4 5.4 0 0 0 6 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"></path>
              <path d="M9 18c-4.51 2-5-2-7-2"></path>
            </svg>
          </a>
          <a href="https://mail.google.com" title="Mail" aria-label="Mail" class="quick">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="3" y="5" width="18" height="14" rx="2"></rect>
              <path d="m3 7 9 6 9-6"></path>
            </svg>
          </a>
          <a href="https://x.com" title="X" aria-label="X" class="quick">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 4 20 20"></path>
              <path d="M20 4 4 20"></path>
            </svg>
          </a>
          <a href="https://figma.com" title="Figma" aria-label="Figma" class="quick">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M8 3h4v6H8a3 3 0 0 1 0-6Z"></path>
              <path d="M12 3h4a3 3 0 0 1 0 6h-4V3Z"></path>
              <path d="M8 9h4v6H8a3 3 0 0 1 0-6Z"></path>
              <path d="M12 9h4a3 3 0 0 1 0 6h-4V9Z"></path>
              <path d="M8 15h4v3a3 3 0 1 1-4-3Z"></path>
            </svg>
          </a>
        </div>
      </section>

      <!-- Focus -->
      <section class="absolute bottom-6 left-6 z-10 w-[300px]">
        <div class="glass rounded-3xl p-5 shadow-2xl">
          <div class="mb-3">
            <div class="text-[10px] uppercase tracking-[0.2em] text-white/70">Daily Focus</div>
            <div id="focus-summary" class="text-sm font-medium">0 tasks remaining</div>
          </div>
          <ul id="todo-list" class="space-y-1.5"></ul>
          <form id="todo-form" class="mt-3 flex items-center gap-2 border-t border-white/15 pt-3">
            <span class="text-white/60">＋</span>
            <input
              id="todo-input"
              type="text"
              placeholder="Add a focus…"
              class="w-full bg-transparent text-sm placeholder:text-white/50 focus:outline-none"
            />
          </form>
        </div>
      </section>

      <!-- Quote -->
      <div class="absolute bottom-6 left-1/2 z-10 -translate-x-1/2 px-4 text-center">
        <p class="text-xs font-light italic text-white/80 drop-shadow-md sm:text-sm">
          "The mountains are calling and I must go."
        </p>
        <p class="mt-0.5 text-[10px] uppercase tracking-[0.25em] text-white/50">— John Muir</p>
      </div>

      <!-- Settings: name -->
      <button id="name-btn" class="glass absolute bottom-6 right-6 z-10 rounded-full px-4 py-2 text-xs text-white/80 shadow-xl hover:bg-white/20">
        Set your name
      </button>
      <div class="pointer-events-none absolute bottom-2 right-6 z-10 text-[10px] font-light tracking-[0.16em] text-white/40 drop-shadow-md">
        by OUSSEMA NAFFETI
      </div>
    </main>

    <script src="newtab.js"></script>
  </body>
</html>
